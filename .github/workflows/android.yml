name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Installation de Flutter pour éviter que Flet ne le demande
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          mkdir -p assets
          # On retire --include-flutter car Flutter est déjà là
          flet build apk --project "PikPikApp" --org "com.tonnom.pikpik"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pikpik-app-apk
          path: build/apk/*.apk
