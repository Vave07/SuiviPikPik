name: Build Flet APK
on: [push] # Se lance à chaque fois que tu envoies du code

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # On utilise une version stable

      - name: Install Dependencies
        run: |
          pip install flet[all]

      - name: Build APK
        run: |
          flet build apk --project pikpik.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pikpik-app
          path: build/apk/*.apk
